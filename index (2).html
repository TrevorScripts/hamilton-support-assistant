<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamilton Support Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{--b:#1a2744;--a:#2d6bcf;--g:#c8a84e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;background:#f3f4f7;color:#1a1a2e}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px}
  button{font-family:inherit;cursor:pointer;transition:all .15s;border:none}button:hover{filter:brightness(1.06)}
  textarea{font-family:inherit}textarea:focus{outline:none;border-color:var(--a)}
  @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .header{background:linear-gradient(135deg,var(--b) 0%,#0f1a33 100%);padding:14px 18px 0;border-bottom:3px solid var(--g);flex-shrink:0}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .logo{width:32px;height:32px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--b);flex-shrink:0}
  .sync-btn{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.06);margin-left:auto}
  .tabs{display:flex;gap:3px}
  .tab{flex:1;padding:10px 6px;border-radius:8px 8px 0 0;font-size:13px;background:transparent;color:rgba(255,255,255,.4);border-bottom:2.5px solid transparent;font-weight:500}
  .tab.active{background:rgba(255,255,255,.12);color:#fff;border-bottom-color:var(--g);font-weight:700}
  .main{flex:1;display:flex;flex-direction:column;min-height:0}
  .quick-bar{padding:8px 14px 2px;display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0}
  .quick-btn{padding:5px 11px;border-radius:16px;border:1px solid rgba(45,107,207,.1);background:rgba(45,107,207,.04);color:var(--a);font-size:11px;font-weight:600;white-space:nowrap}
  .messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}
  .msg{max-width:90%;padding:10px 14px;font-size:13.5px;line-height:1.55;word-break:break-word;animation:fadeIn .2s ease}
  .msg.user{border-radius:14px 14px 3px 14px;background:var(--a);color:#fff;align-self:flex-end}
  .msg.ai{border-radius:14px 14px 14px 3px;background:#fff;color:#1a1a2e;align-self:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .msg-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .msg.user .msg-label{color:rgba(255,255,255,.6)}.msg.ai .msg-label{color:var(--a)}
  .msg h3{margin:10px 0 2px;font-size:14px;font-weight:700;color:var(--b)}
  .msg h4{margin:8px 0 2px;font-size:13px;font-weight:700;color:var(--b)}
  .msg a{color:var(--a);text-decoration:underline;word-break:break-all}
  .msg p{margin:2px 0}
  .ldots{display:flex;align-items:center;gap:5px;padding:10px 14px;background:#fff;border-radius:14px 14px 14px 3px;align-self:flex-start;font-size:12px;color:#999}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--a);animation:pulse 1.2s infinite}
  .input-bar{padding:10px 14px;border-top:1px solid #e2e4ea;background:#fff;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
  .input-bar textarea{flex:1;border:1px solid #d1d5db;border-radius:12px;padding:9px 13px;font-size:13.5px;resize:none;min-height:40px;max-height:120px;line-height:1.4;background:#fafafa}
  .sbtn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
  .sbtn.on{background:var(--a)}.sbtn.off{background:#d1d5db;pointer-events:none}
  .ncall{position:fixed;bottom:72px;right:14px;padding:8px 16px;border-radius:20px;background:var(--g);color:var(--b);font-size:12px;font-weight:700;box-shadow:0 3px 10px rgba(200,168,78,.3);z-index:10}
  #dbg{font-size:10px;color:#666;padding:6px 14px;max-height:80px;overflow-y:auto;flex-shrink:0;background:#fff8e1;border-top:1px solid #ffd54f;line-height:1.4}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">H</div>
    <div style="flex:1">
      <div style="color:#fff;font-size:16px;font-weight:700">Hamilton Support Assistant</div>
      <div style="color:rgba(255,255,255,.45);font-size:10.5px">Full Product Training + Live Resources</div>
    </div>
    <div class="sync-btn" onclick="loadSheet()" title="Click to refresh">
      <div id="dot" style="width:6px;height:6px;border-radius:50%;background:#fbbf24;transition:background .3s"></div>
      <span id="stxt" style="color:rgba(255,255,255,.5);font-size:10.5px">Syncing...</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="t0" onclick="setTab('intake')">&#x1F4DE; Call Intake</button>
    <button class="tab" id="t1" onclick="setTab('help')">&#x1F50D; Help Center</button>
  </div>
</div>

<div class="main">
  <div class="quick-bar" id="qbar"></div>
  <div class="messages" id="msgs"></div>
  <div id="dbg"></div>
  <div class="input-bar">
    <textarea id="inp" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend()}" oninput="rsz()"></textarea>
    <button class="sbtn off" id="sb" onclick="doSend()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<button class="ncall" id="ncb" onclick="newCall()" style="display:none">+ New Call</button>

<script>
const AK="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";
const SID="15uY9RvxmtzcQzEHX_8A4-7Tsfblf5IEKrasrZ6arXxE";
const GID="1233518723";
const CSV1="https://docs.google.com/spreadsheets/d/e/2PACX-1vQOHsO3CSN2YY3t4n9y8Egeq4wJFjLUb6jj6bRca2MmSSszTTC2_QDQUOk7th0Es9CtRlTPw_jFdf4W/pub?gid="+GID+"&single=true&output=csv";
const CSV2="https://docs.google.com/spreadsheets/d/e/2PACX-1vQOHsO3CSN2YY3t4n9y8Egeq4wJFjLUb6jj6bRca2MmSSszTTC2_QDQUOk7th0Es9CtRlTPw_jFdf4W/pub?output=csv";

let tab="intake",res=[],busy=false;
let iMsgs=[{role:"assistant",content:"**Ready for a call.** Give me the customer's **Year, Make, Model, and Trim** and I'll identify the right product, flag compatibility concerns, and pull up relevant links.\n\nOr describe their issue and I'll help troubleshoot."}];
let hMsgs=[{role:"assistant",content:"Search Hamilton's Help Center, product pages, manuals, and YouTube. I can find articles by product class, vehicle, or issue type."}];

const IQ=["2017 Toyota 4Runner SR5","2016 Lexus RX 350","2015 Lexus GX 460","Customer has echo on mic","Screen shows lines after install","Wrong knob/mouse version"];
const HQ=["CarPlay audio setup","Dip switch settings","iOS 26 zoom fix","Backup camera issues","Switch to factory Bluetooth","Firmware update help"];

// ═════════════ DEBUG LOG ═════════════
const logs=[];
function log(msg){
  logs.push(new Date().toLocaleTimeString()+" - "+msg);
  if(logs.length>20) logs.shift();
  document.getElementById("dbg").innerHTML=logs.join("<br>");
  console.log("[HMC]",msg);
}

// ═════════════ NORMALIZE ROWS ═════════════
function normalize(rows){
  return rows.map((row,i)=>{
    const out={id:i};
    Object.keys(row).forEach(k=>{
      const l=k.toLowerCase().trim(), v=(row[k]||"").trim();
      if(!v) return;
      // Article Type column
      if((l==="article type"||l==="type")&&!l.includes("vehicle")) out.type=v;
      // Subject column
      else if(l==="subject"||l.includes("title")||l==="name") out.title=v;
      // Link column
      else if(l==="link"||l.includes("url")) out.url=v;
      // Vehicle Type column
      else if(l==="vehicle type"||l.includes("vehicle")) out.vehicle=v;
    });
    if(!out.title){
      const vals=Object.values(row).filter(x=>x&&x.trim()&&!x.trim().startsWith("http"));
      if(vals.length) out.title=vals[0].trim();
    }
    return out;
  }).filter(r=>r.title||r.url);
}

// ═════════════ METHOD 1: JSONP via Google Visualization API ═════════════
function tryJSONP(){
  return new Promise((resolve,reject)=>{
    const cb="_gc"+Date.now();
    const tm=setTimeout(()=>{cleanup();reject(new Error("JSONP timeout"))},10000);
    function cleanup(){clearTimeout(tm);delete window[cb];const s=document.getElementById(cb);if(s)s.remove()}

    window[cb]=function(resp){
      cleanup();
      try{
        if(!resp||resp.status==="error"||!resp.table){reject(new Error("gviz error response"));return}
        const cols=resp.table.cols.map(c=>c.label||("Col"+c.id));
        log("JSONP columns: "+cols.join(", "));
        const rows=resp.table.rows.map(r=>{
          const obj={};
          r.c.forEach((cell,ci)=>{if(cols[ci]) obj[cols[ci]]=cell?(cell.v!=null?String(cell.v):""):""});
          return obj;
        }).filter(r=>Object.values(r).some(v=>v&&v.trim()));
        log("JSONP raw rows: "+rows.length);
        resolve(rows);
      }catch(e){reject(e)}
    };

    const url="https://docs.google.com/spreadsheets/d/"+SID+"/gviz/tq?tqx=responseHandler:"+cb+"&gid="+GID;
    log("Loading JSONP: "+url.slice(0,80)+"...");
    const s=document.createElement("script");
    s.id=cb; s.src=url;
    s.onerror=()=>{cleanup();reject(new Error("JSONP script failed to load"))};
    document.head.appendChild(s);
  });
}

// ═════════════ METHOD 2: Direct CSV fetch ═════════════
async function tryCSV(url){
  log("Fetching CSV: "+url.slice(0,80)+"...");
  const resp=await fetch(url);
  log("CSV response status: "+resp.status);
  if(!resp.ok) throw new Error("HTTP "+resp.status);
  const text=await resp.text();
  log("CSV response length: "+text.length+" chars");
  log("CSV first 100 chars: "+text.slice(0,100));
  if(!text||text.length<10) throw new Error("Empty response");
  if(text.includes("<!DOCTYPE")||text.includes("<html")) throw new Error("Got HTML not CSV");
  const parsed=Papa.parse(text,{header:true,skipEmptyLines:true});
  log("Papa parsed "+parsed.data.length+" rows, columns: "+(parsed.meta.fields||[]).join(", "));
  if(!parsed.data.length) throw new Error("No rows after parse");
  return parsed.data;
}

// ═════════════ MAIN LOADER ═════════════
async function loadSheet(){
  document.getElementById("dot").style.background="#fbbf24";
  document.getElementById("stxt").textContent="Syncing...";
  log("Starting sheet load...");

  // Try Method 1: JSONP
  try{
    const rows=await tryJSONP();
    res=normalize(rows);
    log("JSONP success: "+res.length+" articles normalized");
    if(res.length>0){
      document.getElementById("dot").style.background="#34d399";
      document.getElementById("stxt").textContent=res.length+" articles";
      log("First article: "+JSON.stringify(res[0]));
      return;
    }
  }catch(e){log("JSONP failed: "+e.message)}

  // Try Method 2: CSV fetch (both URLs)
  for(const url of [CSV1,CSV2]){
    try{
      const rows=await tryCSV(url);
      res=normalize(rows);
      log("CSV success: "+res.length+" articles normalized");
      if(res.length>0){
        document.getElementById("dot").style.background="#34d399";
        document.getElementById("stxt").textContent=res.length+" articles";
        log("First article: "+JSON.stringify(res[0]));
        return;
      }
    }catch(e){log("CSV failed ("+url.slice(-30)+"): "+e.message)}
  }

  log("All methods failed. Sheet may not be published correctly.");
  document.getElementById("dot").style.background="#f87171";
  document.getElementById("stxt").textContent="Offline";
}

// ═════════════ KNOWLEDGE ═════════════
const PK=`## HAMILTON MOTOR COMPANY -- COMPLETE PRODUCT TRAINING

### Company Info
Raleigh, NC. Phone: (919) 858-2890. Hours: M-F 9a-6p ET (closed 11:30a-12p team meeting), Sat 10a-3p ET. 3-year warranty ("Hamilton Guarantee"), 30-day free returns, free shipping, same-day ship before 2-3 PM ET.

### THE 3 KEY QUESTIONS
Q: Single vs Dual vs Upgrade? Single and Dual are both Conversion Kits (full replacement). Single = fused radio+screen. Dual = separate screen and radio. Upgrade Kit does NOT replace -- injects CarPlay/Android Auto onto factory screen.
Q: Conversion vs Upgrade? Conversion = removes factory, replaces with Hamilton unit. Upgrade = taps wiring, factory stays, switch back anytime.
Q: Why Lexus/LC Upgrade differs from 4Runner? Lexus/LC = Dual (LVDS wires). 4Runner = Single (ribbon cables).

### 30-SECOND VEHICLE ID
Knobs in screen unit = Single. Separate knobs = Dual.

### SYSTEM TYPE BY BRAND
DUAL: ALL Lexus, Toyota Land Cruiser, Mercedes, BMW, Infiniti, Acura
SINGLE: Most Toyota (4Runner, Tacoma, Tundra, Highlander, Camry, Sienna, Avalon), Nissan, Subaru, Honda

### 4 PRODUCT CLASSES
Class 1: Lexus Conversion (Dual, Full Replace) - All Lexus. Wired+Wireless CarPlay. AUX or BT. 8GB/128GB. Google Play, 4G. Factory radio stays.
Class 2: Toyota Conversion (Single, Full Replace) - 4Runner, Highlander, Tacoma, Tundra, Camry, Sienna, Avalon, Subaru. Wireless ONLY. NO AM/XM natively. Cannot switch back.
Class 3: Lexus/LC Upgrade (Dual, LVDS, Preserved) - All Lexus+Land Cruiser. Wired+Wireless. Factory preserved. Linux-based. Exception: 2016-21 LC Streaming Package.
Class 4: Toyota/Subaru Upgrade (Single, Ribbon, Preserved) - Ribbon cables. Must have APPS button.

### HARDWARE
Qualcomm 6125, 8GB RAM, 128GB. 4G=T-Mobile. Chinese processors not proven on US 4G.

### RADIO ID (Toyota Single)
P___=Pioneer. 5___=Panasonic. Other=Fujitsu. Panasonic=4 ribbons. Pioneer=2. Fujitsu=2(orange).
4Runner: Pan/Pio/Fuj. Tacoma: Pan only. Tundra: Pan only. Highlander: Pan/Pio. Camry: Pio/Fuj. Sienna: Pan/Pio. Avalon: Pan only.

### XM MODULE WARNING
Below factory radio. Hamilton Upgrade takes spot. Reinstall elsewhere. All XM modules=Pioneer-made.

### SUBARU TELEMATICS
Essential for audio. MUST reinstall.

### AUDIO (Dual)
AUX(default): like iPod in AUX. Echo on upgrade=switch BT. Factory BT: "Use Car's Bluetooth Channel" in settings. Re-pair. Mark Levinson prefer. Sealed channels: FM/AM/XM can't mix Siri. External speaker included.

### LEXUS INPUTS
GX=ALWAYS touchscreen. Knob=circle,spins=LOW TRIM(behind radio). Mouse=trapezoid,slides=HIGH TRIM(connect under). CUSTOMERS CONFUSE. Ask picture.
16RX: NX15-17, ES15-18, IS13-18, RC15-18(Knob or Mouse/Touch). GS12-20,LX570 16-21(Mouse ONLY). RX16-19(Knob/Mouse).
Wrong version: exchange harness, return, software. RX=bracket.
Pre-16RX(2010-15 RX, 2012-14 ES): Different boards, NOT interchangeable.

### DIP SWITCHES
Controls image/touch/mouse/color. Wrong=most common issue. Check Help Center by part number.

### CARPLAY
BT initiates, Wi-Fi takes over. Password: 4-6s and 4-8s. Delete paired: tap once per device(bug).

### FIRMWARE
USB in box. Ships latest. Claims no USB: they have it.

### WIRES
Blue always works(behind screen). Green=behind radio, not universal.

### CHEAT SHEET
XM?-Single:app via 4G. Dual:factory. AUX hate-enable BT,re-pair. Lines-harness/ribbons/dip. Shaky-LVDS loose. Netflix-blocks on car. Echo-BT fix. Processor-Chinese unproven. SIM-TMobile. WiFi-4-6s,4-8s. Pioneer?-check XM module. Factory switch-long-hold voice/menu. Mouse broken-wire under it. Wrong version-harness/return/software,RX=bracket. Lost USB-purchase/courtesy.`;

function resStr(){
  if(!res.length)return"(No articles loaded. Use product knowledge.)";
  return res.map(r=>{const p=[];if(r.type)p.push("["+r.type+"]");if(r.vehicle)p.push("Vehicle: "+r.vehicle);if(r.title)p.push(r.title);if(r.url)p.push("Link: "+r.url);return"- "+p.join(" | ")}).join("\n");
}

function sysPr(){
  const rs=resStr();
  if(tab==="intake")return"You are a Hamilton Motor Company Technical Support AI Assistant helping an agent ON A LIVE PHONE CALL. Be concise.\n\n"+PK+"\n\n### RESOURCE LIBRARY (share relevant links):\n"+rs+"\n\nWORKFLOW: 1.Get Year/Make/Model/Trim 2.ID Single/Dual+class 3.Conv vs Upgrade 4.Lexus:knob/mouse 5.Flag compat 6.Recommend+links 7.Share video/manual 8.Troubleshoot by class\nRULES: Concise. Bullets. Share links. Bold key info.";
  return"You are a Hamilton Motor Company Help Center assistant. Use web search for articles.\n\n"+PK+"\n\n### RESOURCE LIBRARY:\n"+rs+"\n\nSearch: help.hamiltonmotorcompany.com, hamiltonmotorcompany.com, YouTube Hamilton Motor Company. ID class first. Share links. Step-by-step.";
}

// ═════════════ API ═════════════
async function callAPI(msgs,sys,search){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys,messages:msgs};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":AK,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error("API "+r.status);
  const d=await r.json();
  return d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

// ═════════════ RENDER ═════════════
function md(t){
  if(!t)return"";
  return t.split("\n").map(l=>{
    l=l.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/(?<!="|">)(https?:\/\/[^\s<,)]+)/g,'<a href="$1" target="_blank">$1</a>');
    if(l.startsWith("### "))return"<h4>"+l.slice(4)+"</h4>";if(l.startsWith("## "))return"<h3>"+l.slice(3)+"</h3>";
    if(l.match(/^[-*]\s/))return'<div style="padding-left:16px;position:relative;margin:2px 0"><span style="position:absolute;left:2px">&bull;</span>'+l.replace(/^[-*]\s/,"")+"</div>";
    if(l.match(/^\d+\.\s/))return'<div style="padding-left:18px;margin:2px 0">'+l+"</div>";
    if(!l.trim())return'<div style="height:5px"></div>';return"<p>"+l+"</p>";
  }).join("");
}

function draw(){
  const m=tab==="intake"?iMsgs:hMsgs;
  document.getElementById("msgs").innerHTML=m.map(x=>'<div class="msg '+(x.role==='user'?'user':'ai')+'"><div class="msg-label">'+(x.role==='user'?'You':'Hamilton AI')+'</div><div>'+md(x.content)+'</div></div>').join("")+(busy?'<div class="ldots"><div class="dot"></div><div class="dot" style="animation-delay:.15s"></div><div class="dot" style="animation-delay:.3s"></div><span style="margin-left:2px">'+(tab==='help'?'Searching...':'Analyzing...')+'</span></div>':"");
  document.getElementById("msgs").scrollTop=99999;
  const q=tab==="intake"?IQ:HQ;
  document.getElementById("qbar").innerHTML=q.map(x=>'<button class="quick-btn" onclick="doSend(\''+x.replace(/'/g,"\\'")+'\')">'+x+'</button>').join("");
  document.getElementById("inp").placeholder=tab==="intake"?"Year Make Model Trim, or describe issue...":"Search articles, describe issue...";
  document.getElementById("ncb").style.display=tab==="intake"&&iMsgs.length>1?"block":"none";
  ub();
}
function ub(){document.getElementById("sb").className="sbtn "+(document.getElementById("inp").value.trim()&&!busy?"on":"off")}
function rsz(){const e=document.getElementById("inp");e.style.height="40px";e.style.height=Math.min(e.scrollHeight,120)+"px";ub()}
function setTab(t){tab=t;document.getElementById("t0").className="tab"+(t==="intake"?" active":"");document.getElementById("t1").className="tab"+(t==="help"?" active":"");draw()}

async function doSend(text){
  const inp=document.getElementById("inp");const t=(text||inp.value).trim();if(!t||busy)return;
  inp.value="";rsz();const m=tab==="intake"?iMsgs:hMsgs;
  m.push({role:"user",content:t});busy=true;draw();
  try{const reply=await callAPI(m.map(x=>({role:x.role,content:x.content})),sysPr(),tab==="help");m.push({role:"assistant",content:reply})}
  catch(e){m.push({role:"assistant",content:"**Error:** "+e.message})}
  busy=false;draw();
}

function newCall(){
  iMsgs=[{role:"assistant",content:"**Ready for a call.** Give me the customer's **Year, Make, Model, and Trim** and I'll identify the right product, flag compatibility concerns, and pull up relevant links.\n\nOr describe their issue and I'll help troubleshoot."}];
  draw();
}

draw();
loadSheet();
</script>
